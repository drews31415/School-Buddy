[pytest]
testpaths = tests/e2e
python_files = test_scenario*.py
python_classes = Test*
python_functions = test_*

# 시나리오 순서 보장
addopts =
    -v
    --tb=short
    --timeout=120
    -p no:cacheprovider

# 커스텀 마커
markers =
    sla: SLA 기준 검증 테스트
    scenario1: 공지 파이프라인 E2E
    scenario2: 문서 분석 E2E
    scenario3: RAG Q&A E2E
